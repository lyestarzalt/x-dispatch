name: Re-release v1.9.2 (one-off)

# Temporary workflow to publish v1.9.2 from the existing tag without bumping
# the version again. The tag and `release: 1.9.2` commit already exist on
# main; the previous Release run failed in the Windows build step before
# producing artifacts or a GitHub Release. Delete this file once v1.9.2 ships.

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  TAG: v1.9.2
  VERSION: '1.9.2'

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: mac-apple-silicon
            arch: arm64
          - os: macos-15-intel
            name: mac-intel
            arch: x64
          - os: windows-2022
            name: windows
          - os: ubuntu-latest
            name: linux-x64
            sentry: true
          - os: ubuntu-24.04-arm
            name: linux-arm64
            arch: arm64

    steps:
      - name: Check out tag
        uses: actions/checkout@v4
        with:
          ref: v1.9.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install platform dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools

      - name: Install platform dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install python-setuptools

      - name: Package app
        run: npm run make ${{ matrix.arch && format('-- --arch={0}', matrix.arch) || '' }}
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          SENTRY_AUTH_TOKEN: ${{ matrix.sentry && secrets.SENTRY_AUTH_TOKEN || '' }}
          SENTRY_ORG: ${{ matrix.sentry && secrets.SENTRY_ORG || '' }}
          SENTRY_PROJECT: ${{ matrix.sentry && secrets.SENTRY_PROJECT || '' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.name }}
          path: |
            out/make/**/*.exe
            out/make/**/*.nupkg
            out/make/**/RELEASES
            out/make/**/*.dmg
            out/make/**/*.zip
            out/make/**/*.AppImage
          retention-days: 1

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      - name: Flatten artifacts into release folder
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.exe' -o -name '*.nupkg' -o -name 'RELEASES' -o -name '*.dmg' -o -name '*.zip' -o -name '*.AppImage' \) -exec cp {} release-assets/ \;
          echo "Collected assets:"
          ls -la release-assets/

      - name: Generate release notes
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ env.TAG }} --strip header --latest
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT: release-notes.md

      - name: Update CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ env.TAG }}
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT: CHANGELOG.md

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: update CHANGELOG.md for ${{ env.TAG }}"
          git push

      - name: Add footer to release notes
        run: |
          cat >> release-notes.md << 'EOF'

          ---

          If you find this useful, consider giving it a :star:, it helps others discover the project.

          > :apple: **macOS (Sequoia/Tahoe):** The app is unsigned. Go to **System Settings > Privacy & Security** and click **"Open Anyway"**, or run: `xattr -rd com.apple.quarantine /Applications/X-Dispatch.app`

          > :window: **Windows:** If X-Plane doesn't launch from the app, try running X-Dispatch as administrator.
          EOF

      - name: Create GitHub release
        run: |
          # Delete any leftover draft/release from a failed previous run
          gh release delete ${{ env.TAG }} --yes 2>/dev/null || true
          gh release create ${{ env.TAG }} release-assets/* --title "${{ env.TAG }}" --notes-file release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync website stable catalog
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.X_DISPATCH_SITE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "X_DISPATCH_SITE_TOKEN is not configured; skipping website sync."
            exit 0
          fi
          gh workflow run sync-release.yml \
            --repo lyestarzalt/x-dispatch.app \
            -f source_repo="${{ github.repository }}" \
            -f channel="stable" \
            -f tag="${{ env.TAG }}"

      - name: Send Discord notification
        continue-on-error: true
        env:
          NOTES: ${{ steps.changelog.outputs.content }}
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: "X-Dispatch ${{ env.TAG }} Released"
          embed-url: "https://github.com/${{ github.repository }}/releases/tag/${{ env.TAG }}"
          embed-description: |
            ${{ env.NOTES }}

            **Downloads:**
            - [:apple: macOS (Apple Silicon)](https://github.com/${{ github.repository }}/releases/download/${{ env.TAG }}/X-Dispatch-${{ env.VERSION }}-mac-apple-silicon.dmg)
            - [:apple: macOS (Intel)](https://github.com/${{ github.repository }}/releases/download/${{ env.TAG }}/X-Dispatch-${{ env.VERSION }}-mac-intel.dmg)
            - [:window: Windows](https://github.com/${{ github.repository }}/releases/download/${{ env.TAG }}/X-Dispatch-${{ env.VERSION }}-windows-x64.exe)
            - [:penguin: Linux x64](https://github.com/${{ github.repository }}/releases/download/${{ env.TAG }}/X-Dispatch-${{ env.VERSION }}-linux-x64.AppImage)
            - [:penguin: Linux ARM64](https://github.com/${{ github.repository }}/releases/download/${{ env.TAG }}/X-Dispatch-${{ env.VERSION }}-linux-arm64.AppImage)
          embed-color: 3447003
