name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

      - name: Check Drizzle migrations
        run: |
          npx drizzle-kit generate --name ci-check
          if [ -n "$(git status drizzle/ --porcelain)" ]; then
            echo "❌ Schema changes detected but migrations not generated!"
            echo "Run: npx drizzle-kit generate --name describe-change"
            git diff drizzle/
            exit 1
          fi
          echo "✅ Drizzle migrations are up to date"
