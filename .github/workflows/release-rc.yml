name: Release RC

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version bump for this RC
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      rc_number:
        description: RC number (e.g., 1 for rc.1)
        required: true
        default: '1'

permissions:
  contents: write

jobs:
  resolve:
    name: Version Resolution
    runs-on: ubuntu-latest
    outputs:
      rc_version: ${{ steps.rc.outputs.rc_version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compute RC version
        id: rc
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version
          NEXT=$(node -p "require('./package.json').version")
          echo "rc_version=${NEXT}-rc.${{ inputs.rc_number }}" >> $GITHUB_OUTPUT

  build:
    name: Build (${{ matrix.name }})
    needs: resolve
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: mac-apple-silicon
            arch: arm64
          - os: macos-latest
            name: mac-intel
            arch: x64
          - os: windows-latest
            name: windows
          - os: ubuntu-latest
            name: linux

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set RC version in package.json
        run: npm version ${{ needs.resolve.outputs.rc_version }} --no-git-tag-version
        shell: bash

      - name: Install dependencies
        run: npm ci

      - name: Install platform dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm libarchive-tools

      - name: Install platform dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install python-setuptools

      - name: Package app
        run: npm run make ${{ matrix.arch && format('-- --arch={0}', matrix.arch) || '' }}
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4

        with:
          name: rc-${{ needs.resolve.outputs.rc_version }}-${{ matrix.name }}
          path: |
            out/make/**/*.exe
            out/make/**/*.dmg
            out/make/**/*.deb
            out/make/**/*.rpm
          retention-days: 7

  notify:
    name: Notification
    needs: [resolve, build]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compose download links
        id: links
        run: |
          BASE="https://nightly.link/lyestarzalt/x-dispatch/actions/runs/${{ github.run_id }}"
          VERSION="rc-${{ needs.resolve.outputs.rc_version }}"
          EOF_MARKER=$(openssl rand -hex 16)
          {
            echo "downloads<<$EOF_MARKER"
            echo "**Downloads:**"
            echo "- [:apple: macOS (Apple Silicon)](${BASE}/${VERSION}-mac-apple-silicon.zip)"
            echo "- [:apple: macOS (Intel)](${BASE}/${VERSION}-mac-intel.zip)"
            echo "- [:window: Windows](${BASE}/${VERSION}-windows.zip)"
            echo "- [:penguin: Linux](${BASE}/${VERSION}-linux.zip)"
            echo "$EOF_MARKER"
          } >> "$GITHUB_OUTPUT"

      - name: Send Discord notification
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: "X-Dispatch v${{ needs.resolve.outputs.rc_version }} — Release Candidate"
          embed-description: |
            A new release candidate is available for testing.

            ${{ steps.links.outputs.downloads }}

            ${{ steps.changelog.outputs.content }}

            > :warning: This is a pre-release build for testing. Please report any issues.
          embed-color: 15105570
