name: Release RC

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version bump for this RC
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  resolve:
    name: Version Resolution
    runs-on: ubuntu-latest
    outputs:
      rc_version: ${{ steps.rc.outputs.rc_version }}
      tag: ${{ steps.rc.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Compute RC version
        id: rc
        run: |
          set -euo pipefail
          npm version ${{ inputs.version }} --no-git-tag-version
          NEXT=$(node -p "require('./package.json').version")

          # Auto-increment: find the highest existing rc.N for this version
          # among uploaded artifacts. With `--paginate`, the jq filter runs
          # per page and emits one line per match — so we stream the
          # numbers, sort, and take the tail to get the global max instead
          # of trying to compute it inside jq (which previously produced
          # multi-line output that broke the arithmetic below).
          LAST=$(gh api "repos/${{ github.repository }}/actions/artifacts" --paginate \
            --jq ".artifacts[] | select(.name | startswith(\"rc-${NEXT}-rc.\")) | .name | sub(\"^rc-${NEXT}-rc.\"; \"\") | split(\"-\")[0] | tonumber" \
            | sort -n | tail -n 1)
          [[ "$LAST" =~ ^[0-9]+$ ]] || LAST=0
          RC_NUM=$((LAST + 1))

          echo "rc_version=${NEXT}-rc.${RC_NUM}" >> $GITHUB_OUTPUT
          echo "tag=v${NEXT}-rc.${RC_NUM}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

  build:
    name: Build (${{ matrix.name }})
    needs: resolve
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: mac-apple-silicon
            arch: arm64
          - os: macos-15-intel
            name: mac-intel
            arch: x64
          - os: windows-latest
            name: windows
          - os: ubuntu-latest
            name: linux-x64
            sentry: true
          - os: ubuntu-24.04-arm
            name: linux-arm64
            arch: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set RC version in package.json
        run: npm version ${{ needs.resolve.outputs.rc_version }} --no-git-tag-version
        shell: bash

      - name: Install dependencies
        run: npm ci

      - name: Install platform dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools

      - name: Install platform dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install python-setuptools

      - name: Package app
        run: npm run make ${{ matrix.arch && format('-- --arch={0}', matrix.arch) || '' }}
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          # Only upload source maps once — same maps for all platforms
          SENTRY_AUTH_TOKEN: ${{ matrix.sentry && secrets.SENTRY_AUTH_TOKEN || '' }}
          SENTRY_ORG: ${{ matrix.sentry && secrets.SENTRY_ORG || '' }}
          SENTRY_PROJECT: ${{ matrix.sentry && secrets.SENTRY_PROJECT || '' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4

        with:
          name: rc-${{ needs.resolve.outputs.rc_version }}-${{ matrix.name }}
          path: |
            out/make/**/*.exe
            out/make/**/*.dmg
            out/make/**/*.AppImage
          retention-days: 7

  notify:
    name: Notification
    needs: [resolve, build]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: rc-${{ needs.resolve.outputs.rc_version }}-*
          merge-multiple: true

      - name: Flatten artifacts into release folder
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' \) -exec cp {} release-assets/ \;
          test "$(find release-assets -type f | wc -l | tr -d ' ')" = "5"
          (cd release-assets && sha256sum X-Dispatch-* > sha256sums.txt)
          echo "Collected RC release assets:"
          ls -la release-assets/

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          # Discord-specific config: only feat / fix / perf, no commit
          # SHAs or author handles, so the embed stays under the 4096-char
          # description limit and reads well to non-developers. The full
          # changelog (cliff.toml) is still produced for release notes.
          config: cliff-discord.toml
          args: --unreleased --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Truncate changelog if over Discord's embed budget
        id: changelog_safe
        env:
          FULL_CHANGELOG: ${{ steps.changelog.outputs.content }}
        run: |
          # Description budget is 4096 chars total — leave headroom for the
          # downloads list (~700), header, warning footer, and the
          # truncation marker itself.
          MAX_LEN=3000

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$LAST_TAG" ]; then
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${LAST_TAG}...${{ github.sha }}"
          else
            COMPARE_URL="https://github.com/${{ github.repository }}/commits/${{ github.sha }}"
          fi

          if [ ${#FULL_CHANGELOG} -gt $MAX_LEN ]; then
            CHANGELOG="${FULL_CHANGELOG:0:$MAX_LEN}…

          [Full changelog](${COMPARE_URL})"
          else
            CHANGELOG="$FULL_CHANGELOG"
          fi

          EOF_MARKER=$(openssl rand -hex 16)
          {
            echo "content<<$EOF_MARKER"
            echo "$CHANGELOG"
            echo "$EOF_MARKER"
          } >> "$GITHUB_OUTPUT"

      - name: Compose download links
        id: links
        run: |
          BASE="https://github.com/${{ github.repository }}/releases/download/${{ needs.resolve.outputs.tag }}"
          VERSION="${{ needs.resolve.outputs.rc_version }}"
          EOF_MARKER=$(openssl rand -hex 16)
          {
            echo "downloads<<$EOF_MARKER"
            echo "**Downloads:**"
            echo "- [:apple: macOS (Apple Silicon)](${BASE}/${VERSION}-mac-apple-silicon.zip)"
            echo "- [:apple: macOS (Intel)](${BASE}/${VERSION}-mac-intel.zip)"
            echo "- [:window: Windows](${BASE}/${VERSION}-windows.zip)"
            echo "- [:penguin: Linux x64](${BASE}/${VERSION}-linux-x64.zip)"
            echo "- [:penguin: Linux ARM64](${BASE}/${VERSION}-linux-arm64.zip)"
            echo "$EOF_MARKER"
          } >> "$GITHUB_OUTPUT"

      - name: Write release notes
        env:
          CHANGELOG: ${{ steps.changelog_safe.outputs.content }}
          DOWNLOADS: ${{ steps.links.outputs.downloads }}
        run: |
          {
            echo "$CHANGELOG"
            echo
            echo "$DOWNLOADS"
            echo
            echo "---"
            echo
            echo "> :warning: This is a pre-release build for testing. Please report any issues."
            echo
            echo "> :apple: **macOS (Sequoia/Tahoe):** The app is unsigned. Go to **System Settings > Privacy & Security** and click **\"Open Anyway\"**, or run: \`xattr -rd com.apple.quarantine /Applications/X-Dispatch.app\`"
            echo
            echo "> :window: **Windows:** If X-Plane doesn't launch from the app, try running X-Dispatch as administrator."
          } > release-notes.md

      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          gh release delete "$TAG" --cleanup-tag --yes 2>/dev/null || true
          gh release create "$TAG" release-assets/* \
            --title "X-Dispatch $TAG — Release Candidate" \
            --notes-file release-notes.md \
            --prerelease \
            --target "${{ github.sha }}"

      - name: Sync website RC catalog
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.X_DISPATCH_SITE_TOKEN }}
          TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "X_DISPATCH_SITE_TOKEN is not configured; skipping website sync."
            exit 0
          fi
          gh workflow run sync-release.yml \
            --repo lyestarzalt/x-dispatch.app \
            -f source_repo="${{ github.repository }}" \
            -f channel="rc" \
            -f tag="$TAG"

      - name: Send Discord notification
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          embed-title: "X-Dispatch v${{ needs.resolve.outputs.rc_version }} — Release Candidate"
          embed-url: "https://github.com/${{ github.repository }}/releases/tag/${{ needs.resolve.outputs.tag }}"
          embed-description: |
            A new release candidate is available for testing.

            ${{ steps.links.outputs.downloads }}

            ${{ steps.changelog_safe.outputs.content }}

            > :warning: This is a pre-release build for testing. Please report any issues.
          embed-color: 15105570
