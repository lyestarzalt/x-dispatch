name: Build Windows Installer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows x64 installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run make
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            out/make/**/*.exe
          retention-days: 7

      - name: Upload to release (if tag v* exists on this commit)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $exe = Get-ChildItem -Path out/make -Filter *.exe -Recurse | Select-Object -First 1
          if (-not $exe) { throw "No .exe found in out/make" }
          gh release upload "${{ github.ref_name }}" $exe.FullName --clobber
